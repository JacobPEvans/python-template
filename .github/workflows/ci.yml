name: Code Quality

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check formatting with Ruff
      run: |
        ruff format --check src/ tests/

    - name: Lint with Ruff
      run: |
        ruff check src/ tests/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run mypy
      run: |
        mypy src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Bandit security linter
      run: |
        bandit -r src/ -c pyproject.toml

    - name: Run pip-audit for dependency vulnerabilities
      # Disputed/contextual transitive vulnerabilities with no upstream fix.
      # Review quarterly and remove once upstream patches land.
      #   PYSEC-2024-277 — joblib 1.5.3 NumpyArrayWrapper deserialization.
      #     Disputed by supplier (only used during caching of trusted content).
      #   PYSEC-2026-97 — nltk 3.9.4 filestring() arbitrary file read.
      #     Requires user-controlled path input; not exposed by template code.
      run: |
        pip-audit --ignore-vuln PYSEC-2024-277 --ignore-vuln PYSEC-2026-97

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check docstrings with Ruff
      run: |
        ruff check --select D src/
